<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 600" preserveAspectRatio="xMidYMid slice">
  <!-- サロン内観：半個室の安らぎ空間（フラットイラスト） -->
  <defs>
    <linearGradient id="inWall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F8F4EC"/>
      <stop offset="1" stop-color="#EFE6D5"/>
    </linearGradient>
    <linearGradient id="inWin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDFBF7"/>
      <stop offset="1" stop-color="#F0E8D8"/>
    </linearGradient>
    <linearGradient id="inChair" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#EDE4D3"/>
    </linearGradient>
  </defs>

  <!-- 壁と床 -->
  <rect width="1000" height="600" fill="url(#inWall)"/>
  <rect y="470" width="1000" height="130" fill="#E2D5BC"/>
  <line x1="0" y1="470" x2="1000" y2="470" stroke="#C9AD72" stroke-width="1" opacity="0.5"/>

  <!-- 窓と光 -->
  <rect x="600" y="70" width="290" height="400" rx="4" fill="url(#inWin)"/>
  <rect x="600" y="70" width="290" height="400" rx="4" fill="none" stroke="#C9AD72" stroke-width="1.5" opacity="0.6"/>
  <line x1="745" y1="70" x2="745" y2="470" stroke="#C9AD72" stroke-width="1" opacity="0.5"/>
  <line x1="600" y1="270" x2="890" y2="270" stroke="#C9AD72" stroke-width="1" opacity="0.5"/>
  <polygon points="600,70 890,70 760,600 470,600" fill="#FFFFFF" opacity="0.25"/>

  <!-- カーテン -->
  <g fill="#F3EDE3" stroke="#D4BC8B" stroke-width="1" opacity="0.95">
    <path d="M560 40 C580 200 575 360 555 500 L595 500 C615 360 618 200 600 40 Z"/>
    <path d="M915 40 C900 200 902 360 918 500 L955 500 C975 360 972 200 952 40 Z"/>
  </g>
  <line x1="540" y1="40" x2="980" y2="40" stroke="#B89B5E" stroke-width="3" stroke-linecap="round"/>

  <!-- リクライニングチェア -->
  <g>
    <path d="M150 320 Q150 300 170 300 L300 300 Q330 300 350 330 L420 330 Q445 330 445 355 L445 380 Q445 400 425 400 L180 400 Q150 400 150 370 Z" fill="url(#inChair)" stroke="#C9AD72" stroke-width="1.5"/>
    <path d="M150 320 Q150 300 170 300 L290 300 Q310 300 310 320 L310 330 Q310 345 295 345 L165 345 Z" fill="#FFFFFF" opacity="0.7"/>
    <rect x="200" y="400" width="16" height="60" fill="#C2B193"/>
    <rect x="380" y="400" width="16" height="60" fill="#C2B193"/>
    <rect x="170" y="455" width="270" height="10" rx="5" fill="#C2B193"/>
  </g>

  <!-- サイドテーブルとハーブティー -->
  <g>
    <rect x="480" y="360" width="90" height="8" rx="4" fill="#C9AD72"/>
    <rect x="518" y="368" width="12" height="95" fill="#C2B193"/>
    <g>
      <path d="M505 340 q0 14 14 14 h8 q14 0 14 -14 l0 -10 h-36 z" fill="#FFFFFF" stroke="#C9AD72" stroke-width="1.4"/>
      <path d="M541 334 q12 2 10 12 q-2 9 -12 6" fill="none" stroke="#C9AD72" stroke-width="1.4"/>
      <path d="M515 320 q3 -7 0 -12 M525 322 q3 -8 0 -14" stroke="#C9AD72" stroke-width="1.3" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- 観葉植物 -->
  <g>
    <path d="M80 470 L130 470 L122 560 L88 560 Z" fill="#D9C9A8" stroke="#C9AD72" stroke-width="1.2"/>
    <g stroke="#A9B49A" stroke-width="4" fill="none" stroke-linecap="round">
      <path d="M105 470 C105 420 100 390 80 360"/>
      <path d="M105 470 C108 415 118 385 140 362"/>
      <path d="M105 470 C103 430 105 405 112 380"/>
    </g>
    <g fill="#B9C4A8">
      <ellipse cx="78" cy="356" rx="20" ry="9" transform="rotate(-35 78 356)"/>
      <ellipse cx="143" cy="358" rx="20" ry="9" transform="rotate(35 143 358)"/>
      <ellipse cx="113" cy="374" rx="18" ry="8" transform="rotate(8 113 374)"/>
    </g>
  </g>

  <!-- 壁の装飾：ロゴ風フレーム -->
  <circle cx="320" cy="160" r="58" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="320" cy="160" r="58" fill="none" stroke="#C9AD72" stroke-width="1.3"/>
  <g stroke="#B89B5E" stroke-width="1.2" fill="none" stroke-linecap="round" opacity="0.85">
    <path d="M300 190 C305 165 312 148 330 132"/>
    <path d="M311 165 C300 158 292 159 284 166"/>
    <path d="M311 165 C318 152 319 143 315 133"/>
  </g>

  <!-- ペンダントライト -->
  <g>
    <line x1="240" y1="0" x2="240" y2="100" stroke="#B89B5E" stroke-width="1.6"/>
    <path d="M212 100 a28 30 0 0 1 56 0 z" fill="#E8DCC3" stroke="#B89B5E" stroke-width="1.4"/>
    <circle cx="240" cy="112" r="6" fill="#D4BC8B"/>
  </g>
</svg>
