name: Deploy to Cloudflare Workers

on:
  push:
    branches:
      - main
      - claude/japanese-greeting-1xftG
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      # ANTHROPIC_API_KEY を Worker のシークレットへ登録（既存値があれば上書き）
      - name: Sync ANTHROPIC_API_KEY secret
        run: |
          echo -n "$ANTHROPIC_API_KEY" | npx wrangler@4 secret put ANTHROPIC_API_KEY
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Deploy
        run: npx wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
