# =============================================================
# LINE AIオフィス 設定ファイル（office.conf）
# install.sh がこのファイルを読んで全社員を組み立てる。
# 顧客ごとにこのファイルだけ書き換えれば導入できる。
# =============================================================

# --- 基本パス ---
# オフィスの基準ディレクトリ（社員フォルダ・inbox・logs がここにできる）
OFFICE_HOME="$HOME/line-ai-office"

# Claude Code 実行バイナリのパス（環境により異なる）
#   確認方法: which claude
CLAUDE_BIN="/opt/homebrew/bin/claude"

# --- 動作モード（トークン消費に直結）---
# push : LINE着信時だけAIが動く。受付係(leader-poll)を常駐させず、各社員も監視Cronを作らない。
#        → 待機中のトークン消費がほぼゼロ。応答はオーナーがLINEを送った時のみ。【推奨・省トークン】
# poll : 受付係が定期的にLINEを確認し、各社員も5分Cronで監視する。
#        → 即応性は高いが、待機中も常時トークン（Claude利用枠）を消費し続ける。
MODE="push"

# --- ブリッジ／監視のパラメータ ---
PORT=18789           # LINEブリッジの待受ポート
POLL_MS=5000         # 見張り役のポーリング間隔（ミリ秒・task.md監視。ファイル確認のみでトークンは消費しない）
MAX_CONCURRENT=3     # 同時にspawnする最大claude数
THRESHOLD_MIN=60     # 死活監視：タスク滞留の警告しきい値（分）

# --- LINE / MCP ---
OWNER_FRIEND_ID="owner-line-ai-office"   # オーナーのfriendId
MCP_NAME="line-harness"                  # MCPサーバ名

# --- メンバー定義 ---
# 書式:  "<dir>:<表示名>:<role-template.md>"
#   <dir>             : members/ 配下のフォルダ名
#   <表示名>          : LINE/ログ上の日本語表示名
#   <role-template.md>: roles/ 図書館内のテンプレファイル名
#
# 顧客の業種に合わせて、この配列を増減・差し替えするだけで構成が変わる。
# 先頭は必ず leader（コア必須）。
MEMBERS=(
  "member-leader:リーダー:leader.md"
  "member-lp:LP担当:lp.md"
  "member-designer:デザイナー:designer.md"
  "member-writer:ライター:writer.md"
  "member-video:動画制作:video.md"
  "member-sns:SNS担当:sns.md"
  "member-researcher:リサーチャー:researcher.md"
  "member-analyst:アナリスト:analyst.md"
)
